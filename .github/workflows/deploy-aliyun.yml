name: Deploy Web to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: faraway-web-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Build Docker image
        run: docker compose build web

      - name: Pack web release
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            -czf "$RUNNER_TEMP/web-release.tar.gz" .
          cp "$RUNNER_TEMP/web-release.tar.gz" web-release.tar.gz

      - name: Check optional deployment secrets
        id: deploy_config
        env:
          DEPLOY_HOST: ${{ secrets.ALIYUN_HOST || secrets.SERVER_HOST }}
          DEPLOY_USER: ${{ secrets.ALIYUN_USER || secrets.SERVER_USER }}
          DEPLOY_KEY: ${{ secrets.ALIYUN_SSH_KEY || secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PASSWORD: ${{ secrets.ALIYUN_PASSWORD || secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          DEPLOY_ROOT: ${{ secrets.ALIYUN_APP_ROOT }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_ROOT" ] && { [ -n "$DEPLOY_KEY" ] || [ -n "$DEPLOY_PASSWORD" ]; }; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Aliyun deploy secrets are incomplete. Build checks passed, deployment is skipped. Set ALIYUN_HOST, ALIYUN_USER, ALIYUN_APP_ROOT and ALIYUN_SSH_KEY or ALIYUN_PASSWORD to enable GitHub Actions deployment."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release to Aliyun
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST || secrets.SERVER_HOST }}
          username: ${{ secrets.ALIYUN_USER || secrets.SERVER_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY || secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.ALIYUN_PASSWORD || secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          port: ${{ secrets.ALIYUN_SSH_PORT || secrets.SERVER_SSH_PORT || '22' }}
          source: "web-release.tar.gz"
          target: "${{ secrets.ALIYUN_APP_ROOT }}"

      - name: Deploy on Aliyun
        if: steps.deploy_config.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST || secrets.SERVER_HOST }}
          username: ${{ secrets.ALIYUN_USER || secrets.SERVER_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY || secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.ALIYUN_PASSWORD || secrets.SERVER_PASSWORD || secrets.SSH_PASSWORD }}
          port: ${{ secrets.ALIYUN_SSH_PORT || secrets.SERVER_SSH_PORT || '22' }}
          script: |
            set -Eeuo pipefail
            APP_ROOT="${{ secrets.ALIYUN_APP_ROOT }}"
            if [ -z "$APP_ROOT" ]; then
              echo "Missing GitHub Secret: ALIYUN_APP_ROOT" >&2
              exit 1
            fi
            export APP_ROOT
            TMP_DIR="$(mktemp -d)"
            trap 'rm -rf "$TMP_DIR"' EXIT
            tar -xzf "$APP_ROOT/web-release.tar.gz" -C "$TMP_DIR" scripts/deploy_web.sh
            bash "$TMP_DIR/scripts/deploy_web.sh" "$APP_ROOT/web-release.tar.gz"
